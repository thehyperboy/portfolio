<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koushik | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f0e8;
      --surface: rgba(255, 252, 247, 0.82);
      --surface-strong: #fffaf4;
      --text: #1d1a18;
      --muted: #5f5750;
      --primary: #b24c2f;
      --primary-dark: #8e3a22;
      --border: rgba(29, 26, 24, 0.1);
      --shadow: 0 20px 45px rgba(73, 43, 23, 0.12);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(178, 76, 47, 0.18), transparent 28%),
        radial-gradient(circle at right, rgba(96, 123, 104, 0.16), transparent 25%),
        linear-gradient(180deg, var(--bg), #fdf8f3);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    .page-wrap { min-height: 100vh; padding: 28px 6vw 48px; }
    .navbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 48px; }
    .logo, h1, h2, h3 { font-family: "Space Grotesk", sans-serif; }
    .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 18px; }
    .nav-links a { color: var(--muted); font-weight: 500; }
    .hero-content { max-width: 820px; padding: 40px; border: 1px solid var(--border); border-radius: 28px; background: var(--surface); backdrop-filter: blur(10px); box-shadow: var(--shadow); }
    .eyebrow { margin: 0 0 12px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.82rem; font-weight: 700; }
    h1 { margin: 0; font-size: clamp(2.4rem, 6vw, 4.2rem); line-height: 1; }
    .intro { max-width: 680px; margin: 24px 0 0; font-size: 1.05rem; color: var(--muted); }
    .section { margin-top: 44px; }
    .section-heading { margin-bottom: 24px; }
    h2 { margin: 0; font-size: clamp(1.8rem, 4vw, 2.8rem); }
    .card { padding: 28px; border: 1px solid var(--border); border-radius: 24px; background: var(--surface); box-shadow: var(--shadow); }
    .card h3 { margin-top: 0; margin-bottom: 10px; font-size: 1.3rem; }
    .card p, .contact-links a, .contact-links span { margin: 0; color: var(--muted); }
    .contact-links { display: grid; gap: 12px; margin-top: 18px; }
    .button-link { display: inline-flex; align-items: center; justify-content: center; padding: 14px 22px; border-radius: 999px; background: var(--surface-strong); border: 1px solid var(--border); font-weight: 700; }
    .back-link { display: inline-flex; margin-top: 32px; padding: 14px 20px; border-radius: 999px; background: var(--surface-strong); border: 1px solid var(--border); color: var(--text); font-weight: 700; }
    .button-link:hover, .back-link:hover { color: var(--primary); }
    @media (max-width: 640px) {
      .page-wrap { padding-top: 20px; }
      .navbar { flex-direction: column; align-items: flex-start; margin-bottom: 32px; }
      .hero-content, .card { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <header class="navbar">
      <div class="logo">Koushik</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </div>
    </header>

    <section class="hero-content">
      <p class="eyebrow">Contact</p>
      <h1>Let's Talk</h1>
      <p class="intro">I’m always happy to connect, collaborate, or answer questions about my work.</p>
    </section>

    <main>
      <section class="section">
        <div class="section-heading">
          <p class="eyebrow">Reach Out</p>
          <h2>Contact Information</h2>
        </div>
        <div class="card">
          <h3>Email</h3>
          <p><a href="mailto:kaushik2007.aila@gmail.com">kaushik2007.aila@gmail.com</a></p>
          <h3 style="margin-top: 22px;">Phone</h3>
          <p><a href="tel:9391134136">9391134136</a></p>
          <h3 style="margin-top: 22px;">Location</h3>
          <p>Boduppal, Medchal-Malkajgiri, Telangana</p>
        </div>
      </section>

      <a class="back-link" href="index.html">Back to Home</a>
    </main>
  </div>
</body>
</html>
