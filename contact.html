<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koushik | Contact</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-soft: #f2f2f5;
      --text: #111111;
      --muted: #6e6e73;
      --accent: #000000;
      --border: #d8d8db;
      --shadow: 0 24px 56px rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--text); background: var(--bg); }
    a { color: inherit; text-decoration: none; }
    .page-wrap { max-width: 980px; margin: 0 auto; padding: 32px 5vw 64px; }
    .navbar { display: flex; justify-content: space-between; align-items: center; gap: 20px; padding-bottom: 24px; }
    .logo { font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 20px; color: var(--muted); font-weight: 600; }
    .nav-links a:hover { color: var(--accent); }
    .hero { background: var(--surface); border: 1px solid var(--border); border-radius: 32px; box-shadow: var(--shadow); padding: 40px; display: grid; gap: 22px; }
    .eyebrow { margin: 0; color: var(--muted); text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.78rem; }
    h1 { margin: 0; font-size: clamp(2.8rem, 5vw, 4rem); line-height: 1.02; }
    .hero-copy { margin: 0; color: var(--muted); line-height: 1.75; }
    .contact-panel { margin-top: 48px; display: grid; gap: 20px; }
    .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 32px; box-shadow: 0 24px 48px rgba(0,0,0,0.04); padding: 32px; }
    .contact-card h3 { margin: 0 0 8px; font-size: 1.05rem; }
    .contact-card p { margin: 0; color: var(--muted); line-height: 1.7; }
    .contact-list { display: grid; gap: 14px; margin-top: 20px; }
    .contact-item { padding: 20px 22px; border-radius: 24px; background: var(--surface-soft); border: 1px solid var(--border); }
    .contact-item strong { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.12em; }
    .contact-item span, .contact-item a { color: var(--accent); font-weight: 700; }
    .back-link { display: inline-block; margin-top: 40px; padding: 15px 24px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); color: var(--accent); font-weight: 700; }
    @media (max-width: 700px) { .page-wrap { padding: 24px 5vw 48px; } }
  </style>
</head>
<body>
  <div class="page-wrap">
    <header class="navbar">
      <div class="logo">Koushik</div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <p class="eyebrow">Contact</p>
      <h1>Let’s connect.</h1>
      <p class="hero-copy">If you want to discuss a project, collaboration, or simply say hello, these are the best ways to reach me.</p>
    </section>

    <div class="contact-panel">
      <div class="contact-card">
        <h3>Email</h3>
        <p><a href="mailto:kaushik2007.aila@gmail.com">kaushik2007.aila@gmail.com</a></p>
      </div>
      <div class="contact-card">
        <h3>Phone</h3>
        <p><a href="tel:9391134136">9391134136</a></p>
      </div>
      <div class="contact-card">
        <h3>Location</h3>
        <p>Boduppal, Medchal-Malkajgiri, Telangana</p>
      </div>
    </div>

    <a class="back-link" href="index.html">Back to Home</a>
  </div>
</body>
</html>
